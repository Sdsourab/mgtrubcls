<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — UniSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modules/auth.css') }}">
</head>
<body class="auth-body">

    <!-- Ambient background -->
    <div class="auth-bg">
        <div class="auth-orb orb-1"></div>
        <div class="auth-orb orb-2"></div>
        <div class="auth-orb orb-3"></div>
        <div class="auth-grid"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Logo -->
            <div class="auth-logo">
                <svg width="48" height="48" viewBox="0 0 36 36" fill="none" aria-hidden="true">
                    <circle cx="18" cy="18" r="17" stroke="url(#rlg1)" stroke-width="2"/>
                    <path d="M10 24 L18 12 L26 24" stroke="url(#rlg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="18" cy="22" r="2.5" fill="url(#rlg2)"/>
                    <defs>
                        <linearGradient id="rlg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4a8cff"/><stop offset="1" stop-color="#7fb3ff"/>
                        </linearGradient>
                        <linearGradient id="rlg2" x1="10" y1="12" x2="26" y2="24" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#f97e5a"/><stop offset="1" stop-color="#f5c842"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div>
                    <h1>UniSync</h1>
                    <p>Rabindra University, Bangladesh</p>
                </div>
            </div>

            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the academic portal</p>

            <!-- Feedback -->
            <div id="authError"   class="auth-error   hidden" role="alert"></div>
            <div id="authSuccess" class="auth-success hidden" role="status"></div>

            <!-- Registration form -->
            <form class="auth-form" onsubmit="handleRegister(event)" novalidate>

                <!-- Full name -->
                <div class="input-group">
                    <label for="full_name">Full Name</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="full_name" placeholder="Your full name" required autocomplete="name">
                    </div>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input type="email" id="email" placeholder="your@email.com" required autocomplete="email" inputmode="email">
                    </div>
                </div>

                <!-- Department -->
                <div class="input-group">
                    <label for="dept">Department</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                        <input type="text" id="dept" placeholder="Management" value="Management" autocomplete="organization">
                    </div>
                </div>

                <!-- Program + Year row -->
                <div class="input-row">
                    <div class="input-group">
                        <label for="program">Program</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                            </svg>
                            <select id="program" onchange="updateYearOptions()" required>
                                <option value="BBA">BBA</option>
                                <option value="MBA">MBA</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="year">Year</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                                <rect x="3" y="4" width="18" height="18" rx="2"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            <select id="year" required>
                                <option value="1">Year 1</option>
                                <option value="2">Year 2</option>
                                <option value="3">Year 3</option>
                                <option value="4">Year 4</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Semester -->
                <div class="input-group">
                    <label for="semester">Semester</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <select id="semester" required>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                        </select>
                    </div>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            placeholder="Min. 6 characters"
                            required
                            minlength="6"
                            autocomplete="new-password"
                        >
                        <button type="button" class="toggle-pass" onclick="togglePass('password', 'regEyeIcon')" aria-label="Toggle password visibility">
                            <svg id="regEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="regBtn">
                    <span id="regBtnText">Create Account</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                    </svg>
                </button>

            </form>

            <p class="auth-switch">
                Already have an account? <a href="/auth/login">Sign in</a>
            </p>

        </div>
    </div>

    <script>
    async function handleRegister(e) {
        e.preventDefault();

        const btn     = document.getElementById('regBtn');
        const btnText = document.getElementById('regBtnText');
        const errDiv  = document.getElementById('authError');
        const sucDiv  = document.getElementById('authSuccess');

        btn.disabled     = true;
        btnText.textContent = 'Creating…';
        errDiv.classList.add('hidden');
        sucDiv.classList.add('hidden');

        const payload = {
            full_name: document.getElementById('full_name').value.trim(),
            email:     document.getElementById('email').value.trim(),
            password:  document.getElementById('password').value,
            dept:      document.getElementById('dept').value.trim() || 'Management',
            program:   document.getElementById('program').value,
            year:      parseInt(document.getElementById('year').value),
            semester:  parseInt(document.getElementById('semester').value),
        };

        try {
            const res  = await fetch('/auth/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
                sucDiv.textContent = data.message || 'Registration successful! Please check your email to verify.';
                sucDiv.classList.remove('hidden');
                btnText.textContent = 'Done!';
                setTimeout(() => { window.location.href = '/auth/login'; }, 3000);
            } else {
                errDiv.textContent = data.error || 'Registration failed. Please try again.';
                errDiv.classList.remove('hidden');
                resetBtn();
            }
        } catch (err) {
            errDiv.textContent = 'Connection error. Please try again.';
            errDiv.classList.remove('hidden');
            resetBtn();
        }
    }

    function resetBtn() {
        document.getElementById('regBtn').disabled = false;
        document.getElementById('regBtnText').textContent = 'Create Account';
    }

    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon  = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>`;
        } else {
            input.type = 'password';
            icon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>`;
        }
    }

    function updateYearOptions() {
        const program = document.getElementById('program').value;
        const yearSel = document.getElementById('year');
        const maxYear = program === 'BBA' ? 4 : 2;
        yearSel.innerHTML = '';
        for (let i = 1; i <= maxYear; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `Year ${i}`;
            yearSel.appendChild(opt);
        }
    }
    </script>

</body>
</html>
