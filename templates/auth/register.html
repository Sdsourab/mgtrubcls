<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — UniSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modules/auth.css') }}">

    <style>
    /* ── Beautiful Register Submit Button ─────────────────────────── */
    .reg-btn-wrap {
        position: relative;
        margin-top: 8px;
    }

    /* Glow halo behind the button */
    .reg-btn-glow {
        position: absolute;
        inset: -4px;
        border-radius: 18px;
        background: linear-gradient(135deg, #7c6fff, #ec4899, #60a5fa);
        filter: blur(14px);
        opacity: 0;
        transition: opacity 0.4s ease;
        z-index: 0;
        pointer-events: none;
    }

    #regBtn {
        position: relative;
        z-index: 1;
        width: 100%;
        padding: 15px 24px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-family: var(--font-body, 'Plus Jakarta Sans', sans-serif);
        font-size: 0.97rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        overflow: hidden;

        /* Gradient base */
        background: linear-gradient(135deg, #7c6fff 0%, #a855f7 50%, #ec4899 100%);
        background-size: 200% 200%;
        background-position: 0% 50%;

        /* Subtle inner border shimmer */
        box-shadow:
            0 0 0 1px rgba(255,255,255,0.12) inset,
            0 4px 20px rgba(124,111,255,0.35),
            0 1px 0 rgba(255,255,255,0.18) inset;

        transition:
            background-position 0.5s ease,
            box-shadow 0.3s ease,
            transform 0.2s ease,
            opacity 0.2s ease;
    }

    /* Animate gradient on hover */
    #regBtn:hover:not(:disabled) {
        background-position: 100% 50%;
        box-shadow:
            0 0 0 1px rgba(255,255,255,0.18) inset,
            0 6px 28px rgba(124,111,255,0.5),
            0 1px 0 rgba(255,255,255,0.22) inset;
        transform: translateY(-1px);
    }

    /* Trigger glow halo on hover */
    .reg-btn-wrap:hover .reg-btn-glow {
        opacity: 0.55;
    }

    #regBtn:active:not(:disabled) {
        transform: translateY(0px) scale(0.99);
        box-shadow: 0 2px 12px rgba(124,111,255,0.4);
    }

    /* Disabled / loading state */
    #regBtn:disabled {
        opacity: 0.72;
        cursor: not-allowed;
        transform: none;
        background-position: 0% 50%;
    }

    /* Shimmer sweep overlay */
    #regBtn::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
        transform: skewX(-20deg);
        transition: none;
    }
    #regBtn:hover:not(:disabled)::before {
        animation: shimmerSweep 0.65s ease forwards;
    }
    @keyframes shimmerSweep {
        from { left: -100%; }
        to   { left: 160%;  }
    }

    /* Particle dots decoration */
    #regBtn::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            radial-gradient(circle at 15% 50%, rgba(255,255,255,0.08) 1px, transparent 1px),
            radial-gradient(circle at 85% 30%, rgba(255,255,255,0.08) 1px, transparent 1px),
            radial-gradient(circle at 45% 80%, rgba(255,255,255,0.06) 1px, transparent 1px);
        pointer-events: none;
    }

    /* Icon rotation on hover */
    #regBtn .btn-icon {
        transition: transform 0.3s ease;
        flex-shrink: 0;
    }
    #regBtn:hover:not(:disabled) .btn-icon {
        transform: translateX(4px);
    }

    /* Spinner animation */
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    .btn-spinner {
        width: 16px; height: 16px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
    }

    /* Success state */
    #regBtn.btn-success {
        background: linear-gradient(135deg, #059669, #34d399) !important;
        background-size: 100% !important;
        box-shadow: 0 4px 20px rgba(52,211,153,0.4) !important;
    }
    .reg-btn-wrap.success .reg-btn-glow {
        background: linear-gradient(135deg, #059669, #34d399) !important;
        opacity: 0.4;
    }
    </style>
</head>
<body class="auth-body">

    <!-- Ambient background -->
    <div class="auth-bg">
        <div class="auth-orb orb-1"></div>
        <div class="auth-orb orb-2"></div>
        <div class="auth-orb orb-3"></div>
        <div class="auth-grid"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Logo -->
            <div class="auth-logo">
                <svg width="48" height="48" viewBox="0 0 36 36" fill="none" aria-hidden="true">
                    <circle cx="18" cy="18" r="17" stroke="url(#rlg1)" stroke-width="2"/>
                    <path d="M10 24 L18 12 L26 24" stroke="url(#rlg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="18" cy="22" r="2.5" fill="url(#rlg2)"/>
                    <defs>
                        <linearGradient id="rlg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4a8cff"/><stop offset="1" stop-color="#7fb3ff"/>
                        </linearGradient>
                        <linearGradient id="rlg2" x1="10" y1="12" x2="26" y2="24" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#f97e5a"/><stop offset="1" stop-color="#f5c842"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div>
                    <h1>UniSync</h1>
                    <p>Rabindra University, Bangladesh</p>
                </div>
            </div>

            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the academic portal</p>

            <!-- Feedback -->
            <div id="authError"   class="auth-error   hidden" role="alert"></div>
            <div id="authSuccess" class="auth-success hidden" role="status"></div>

            <!-- Registration form -->
            <form class="auth-form" onsubmit="handleRegister(event)" novalidate>

                <!-- Full name -->
                <div class="input-group">
                    <label for="full_name">Full Name</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="full_name" placeholder="Your full name" required autocomplete="name">
                    </div>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input type="email" id="email" placeholder="your@email.com" required autocomplete="email" inputmode="email">
                    </div>
                </div>

                <!-- Department -->
                <div class="input-group">
                    <label for="dept">Department</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                        <input type="text" id="dept" placeholder="Management" value="Management" autocomplete="organization">
                    </div>
                </div>

                <!-- Program + Year row -->
                <div class="input-row">
                    <div class="input-group">
                        <label for="program">Program</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                            </svg>
                            <select id="program" onchange="updateYearOptions()" required>
                                <option value="BBA">BBA</option>
                                <option value="MBA">MBA</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="year">Year</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                                <rect x="3" y="4" width="18" height="18" rx="2"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            <select id="year" required>
                                <option value="1">Year 1</option>
                                <option value="2">Year 2</option>
                                <option value="3">Year 3</option>
                                <option value="4">Year 4</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Semester -->
                <div class="input-group">
                    <label for="semester">Semester</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <select id="semester" required>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                        </select>
                    </div>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            placeholder="Min. 6 characters"
                            required
                            minlength="6"
                            autocomplete="new-password"
                        >
                        <button type="button" class="toggle-pass" onclick="togglePass('password', 'regEyeIcon')" aria-label="Toggle password visibility">
                            <svg id="regEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- ── BEAUTIFUL SUBMIT BUTTON ── -->
                <div class="reg-btn-wrap">
                    <div class="reg-btn-glow"></div>
                    <button type="submit" id="regBtn" aria-label="Create account">
                        <span id="regBtnText">Create Account</span>
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18" aria-hidden="true">
                            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                        </svg>
                    </button>
                </div>

            </form>

            <p class="auth-switch">
                Already have an account? <a href="/auth/login">Sign in</a>
            </p>

        </div>
    </div>

    <script>
    async function handleRegister(e) {
        e.preventDefault();

        const btn     = document.getElementById('regBtn');
        const btnText = document.getElementById('regBtnText');
        const errDiv  = document.getElementById('authError');
        const sucDiv  = document.getElementById('authSuccess');
        const wrap    = btn.closest('.reg-btn-wrap');

        // Loading state
        btn.disabled = true;
        btn.innerHTML = `<div class="btn-spinner"></div><span>Creating account…</span>`;

        errDiv.classList.add('hidden');
        sucDiv.classList.add('hidden');

        const payload = {
            full_name: document.getElementById('full_name').value.trim(),
            email:     document.getElementById('email').value.trim(),
            password:  document.getElementById('password').value,
            dept:      document.getElementById('dept').value.trim() || 'Management',
            program:   document.getElementById('program').value,
            year:      parseInt(document.getElementById('year').value),
            semester:  parseInt(document.getElementById('semester').value),
        };

        try {
            const res  = await fetch('/auth/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
                // ── Success state ──────────────────────────────────
                btn.classList.add('btn-success');
                if (wrap) wrap.classList.add('success');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span>Account Created!</span>`;

                sucDiv.textContent = data.message || 'Registration successful! Please check your email to verify.';
                sucDiv.classList.remove('hidden');

                setTimeout(() => { window.location.href = '/auth/login'; }, 2800);
            } else {
                errDiv.textContent = data.error || 'Registration failed. Please try again.';
                errDiv.classList.remove('hidden');
                resetBtn();
            }
        } catch (err) {
            errDiv.textContent = 'Connection error. Please try again.';
            errDiv.classList.remove('hidden');
            resetBtn();
        }
    }

    function resetBtn() {
        const btn  = document.getElementById('regBtn');
        btn.disabled = false;
        btn.classList.remove('btn-success');
        const wrap = btn.closest('.reg-btn-wrap');
        if (wrap) wrap.classList.remove('success');
        btn.innerHTML = `
            <span id="regBtnText">Create Account</span>
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18" aria-hidden="true">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>`;
    }

    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon  = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>`;
        } else {
            input.type = 'password';
            icon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>`;
        }
    }

    function updateYearOptions() {
        const program = document.getElementById('program').value;
        const yearSel = document.getElementById('year');
        const maxYear = program === 'BBA' ? 4 : 2;
        yearSel.innerHTML = '';
        for (let i = 1; i <= maxYear; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `Year ${i}`;
            yearSel.appendChild(opt);
        }
    }
    </script>

</body>
</html>
