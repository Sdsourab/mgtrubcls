<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — UniSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modules/auth.css') }}">
</head>
<body class="auth-body">
    <div class="auth-bg">
        <div class="auth-orb orb-1"></div>
        <div class="auth-orb orb-2"></div>
        <div class="auth-orb orb-3"></div>
        <div class="auth-grid"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="48" height="48" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="18" r="17" stroke="url(#alg1)" stroke-width="2"/>
                    <path d="M10 24 L18 12 L26 24" stroke="url(#alg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="18" cy="22" r="2.5" fill="url(#alg2)"/>
                    <defs>
                        <linearGradient id="alg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse"><stop stop-color="#7C6FFF"/><stop offset="1" stop-color="#C084FC"/></linearGradient>
                        <linearGradient id="alg2" x1="10" y1="12" x2="26" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#A78BFA"/><stop offset="1" stop-color="#EC4899"/></linearGradient>
                    </defs>
                </svg>
                <div><h1>UniSync</h1><p>Rabindra University, Bangladesh</p></div>
            </div>

            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the academic portal</p>
            <div id="authError" class="auth-error hidden"></div>
            <div id="authSuccess" class="auth-success hidden"></div>

            <form class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" id="full_name" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Department</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                            <input type="text" id="dept" placeholder="Management" value="Management">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Program</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                            </svg>
                            <select id="program" onchange="updateYearOptions()" required>
                                <option value="BBA">BBA</option>
                                <option value="MBA">MBA</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Year</label>
                            <div class="input-wrap">
                                <select id="year" required>
                                    <option value="1">Year 1</option>
                                    <option value="2">Year 2</option>
                                    <option value="3">Year 3</option>
                                    <option value="4">Year 4</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Semester</label>
                            <div class="input-wrap">
                                <select id="semester" required>
                                    <option value="1">Semester 1</option>
                                    <option value="2">Semester 2</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                        <button type="button" class="toggle-pass" onclick="togglePass('password',this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary btn-full" id="regBtn">
                    <span>Create Account</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
            </form>
            <p class="auth-switch">Already have an account? <a href="/auth/login">Sign in</a></p>
        </div>
    </div>

    <script>
    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        const errDiv = document.getElementById('authError');
        const sucDiv = document.getElementById('authSuccess');
        btn.disabled = true; btn.querySelector('span').textContent = 'Creating...';
        errDiv.classList.add('hidden'); sucDiv.classList.add('hidden');

        const payload = {
            full_name: document.getElementById('full_name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            dept: document.getElementById('dept').value || 'Management',
            program:  document.getElementById('program').value,
            year:     parseInt(document.getElementById('year').value),
            semester: parseInt(document.getElementById('semester').value),
        };

        try {
            const res = await fetch('/auth/api/register', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                sucDiv.textContent = data.message || 'Registration successful! Check your email.';
                sucDiv.classList.remove('hidden');
                setTimeout(() => window.location.href = '/auth/login', 3000);
            } else {
                errDiv.textContent = data.error || 'Registration failed';
                errDiv.classList.remove('hidden');
                btn.disabled = false; btn.querySelector('span').textContent = 'Create Account';
            }
        } catch(err) {
            errDiv.textContent = 'Connection error.';
            errDiv.classList.remove('hidden');
            btn.disabled = false; btn.querySelector('span').textContent = 'Create Account';
        }
    }
    function togglePass(id) {
        const inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
    }
    function updateYearOptions() {
    const program = document.getElementById('program').value;
    const yearSel = document.getElementById('year');
    const maxYear = program === 'BBA' ? 4 : 2;
    yearSel.innerHTML = '';
    for (let i = 1; i <= maxYear; i++) {
        yearSel.innerHTML += `<option value="${i}">Year ${i}</option>`;
    }
}
    </script>
</body>
</html>
