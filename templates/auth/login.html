<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — UniSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modules/auth.css') }}">
</head>
<body class="auth-body">

    <!-- Ambient background -->
    <div class="auth-bg">
        <div class="auth-orb orb-1"></div>
        <div class="auth-orb orb-2"></div>
        <div class="auth-orb orb-3"></div>
        <div class="auth-grid"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Logo -->
            <div class="auth-logo">
                <svg width="48" height="48" viewBox="0 0 36 36" fill="none" aria-hidden="true">
                    <circle cx="18" cy="18" r="17" stroke="url(#alg1)" stroke-width="2"/>
                    <path d="M10 24 L18 12 L26 24" stroke="url(#alg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="18" cy="22" r="2.5" fill="url(#alg2)"/>
                    <defs>
                        <linearGradient id="alg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4a8cff"/><stop offset="1" stop-color="#7fb3ff"/>
                        </linearGradient>
                        <linearGradient id="alg2" x1="10" y1="12" x2="26" y2="24" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#f97e5a"/><stop offset="1" stop-color="#f5c842"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div>
                    <h1>UniSync</h1>
                    <p>Rabindra University, Bangladesh</p>
                </div>
            </div>

            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your academic portal</p>

            <!-- Error feedback -->
            <div id="authError" class="auth-error hidden" role="alert"></div>

            <!-- Login form -->
            <form class="auth-form" onsubmit="handleLogin(event)" novalidate>

                <div class="input-group">
                    <label for="email">Email address</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input
                            type="email"
                            id="email"
                            placeholder="your@email.com"
                            required
                            autocomplete="email"
                            inputmode="email"
                        >
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-pass" onclick="togglePass('password')" aria-label="Toggle password visibility">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                    </svg>
                </button>

            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span>or</span>
            </div>

            <!-- Guest access button (NEW) -->
            <a href="/guest/" class="guest-btn" role="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Continue as Guest
            </a>

            <p class="auth-switch">
                Don't have an account? <a href="/auth/register">Create one</a>
            </p>

        </div>
    </div>

    <script>
    async function handleLogin(e) {
        e.preventDefault();

        const btn     = document.getElementById('loginBtn');
        const btnText = document.getElementById('loginBtnText');
        const errDiv  = document.getElementById('authError');

        btn.disabled  = true;
        btnText.textContent = 'Signing in…';
        errDiv.classList.add('hidden');

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
            const res  = await fetch('/auth/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('us_token', data.access_token);
                localStorage.setItem('us_user',  JSON.stringify(data.user));
                btnText.textContent = 'Redirecting…';
                window.location.href = '/dashboard';
            } else {
                showError(data.error || 'Login failed. Please check your credentials.');
                resetBtn();
            }
        } catch (err) {
            showError('Connection error. Please try again.');
            resetBtn();
        }
    }

    function showError(msg) {
        const errDiv = document.getElementById('authError');
        errDiv.textContent = msg;
        errDiv.classList.remove('hidden');
    }

    function resetBtn() {
        const btn     = document.getElementById('loginBtn');
        const btnText = document.getElementById('loginBtnText');
        btn.disabled  = false;
        btnText.textContent = 'Sign In';
    }

    function togglePass(id) {
        const input = document.getElementById(id);
        const icon  = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>`;
        } else {
            input.type = 'password';
            icon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>`;
        }
    }
    </script>

</body>
</html>
