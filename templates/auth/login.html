<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — UniSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/modules/auth.css">
  <link rel="stylesheet" href="/static/css/modules/scroll-animations.css">
</head>
<body class="auth-body">

  <!-- Ambient warm background -->
  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
    <div class="auth-orb orb-3"></div>
    <div class="auth-grid"></div>
  </div>

  <!-- Auto-login spinner (shown briefly while checking session) -->
  <div id="autoLoginOverlay" style="
    position:fixed;inset:0;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--bg-base,#FAF5E9);gap:16px;
  ">
    <svg width="46" height="46" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18.5" stroke="url(#al1)" stroke-width="1.6"/>
      <path d="M11 27 L20 13 L29 27" stroke="url(#al2)" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="25" r="2.8" fill="url(#al2)"/>
      <defs>
        <linearGradient id="al1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
          <stop stop-color="#CDA96A"/><stop offset="1" stop-color="#BC6F37"/>
        </linearGradient>
        <linearGradient id="al2" x1="11" y1="13" x2="29" y2="27" gradientUnits="userSpaceOnUse">
          <stop stop-color="#DFC087"/><stop offset="1" stop-color="#9A5A2C"/>
        </linearGradient>
      </defs>
    </svg>
    <div style="font-size:0.85rem;color:#9A7A4A;font-family:'Outfit',sans-serif;">Signing you in…</div>
  </div>

  <div class="auth-container" id="loginContainer" style="display:none;">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <svg width="46" height="46" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18.5" stroke="url(#llg1)" stroke-width="1.6"/>
          <path d="M11 27 L20 13 L29 27" stroke="url(#llg2)" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="25" r="2.8" fill="url(#llg2)"/>
          <defs>
            <linearGradient id="llg1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#CDA96A"/><stop offset="1" stop-color="#BC6F37"/>
            </linearGradient>
            <linearGradient id="llg2" x1="11" y1="13" x2="29" y2="27" gradientUnits="userSpaceOnUse">
              <stop stop-color="#DFC087"/><stop offset="1" stop-color="#9A5A2C"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <h1>UniSync</h1>
          <p>Rabindra University, Bangladesh</p>
        </div>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Sign in to your academic portal</p>

      <div id="authError" class="auth-error hidden" role="alert"></div>

      <form class="auth-form" onsubmit="handleLogin(event)" novalidate>

        <!-- Email -->
        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="email" placeholder="your@email.com"
                   required autocomplete="email" inputmode="email">
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="••••••••"
                   required autocomplete="current-password">
            <button type="button" class="toggle-pass" onclick="togglePass('password','eyeIcon')"
                    aria-label="Toggle password visibility">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember Me -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <input type="checkbox" id="rememberMe" checked
                 style="width:15px;height:15px;accent-color:#BC6F37;cursor:pointer;">
          <label for="rememberMe"
                 style="font-size:0.80rem;color:var(--text-muted);cursor:pointer;user-select:none;">
            Keep me signed in
          </label>
        </div>

        <button type="submit" class="btn-primary btn-full" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <svg class="login-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        </button>
      </form>

      <!-- Guest Mode -->
      <div class="guest-divider"><span>or</span></div>
      <a href="/guest/" class="btn-guest">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="17" height="17">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Continue as Guest — No login needed
      </a>

      <p class="auth-switch">No account? <a href="/auth/register">Create one free</a></p>
    </div>
  </div>

  <script>
  // ── Auto-login: if session exists in localStorage, skip login page ──────────
  (function checkExistingSession() {
    try {
      const token = localStorage.getItem('us_token');
      const user  = localStorage.getItem('us_user');

      if (token && user && JSON.parse(user)) {
        // Valid session found — redirect directly to dashboard
        window.location.replace('/dashboard');
        return; // keep overlay visible while redirecting
      }
    } catch(e) {}

    // No session — hide overlay, show login form
    document.getElementById('autoLoginOverlay').style.display = 'none';
    document.getElementById('loginContainer').style.display   = '';
  })();
  // ────────────────────────────────────────────────────────────────────────────

  async function handleLogin(e) {
    e.preventDefault();
    const btn      = document.getElementById('loginBtn');
    const errDiv   = document.getElementById('authError');
    const remember = document.getElementById('rememberMe').checked;

    btn.disabled = true;
    btn.innerHTML = `<div style="width:17px;height:17px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;"></div><span>Signing in…</span>`;
    errDiv.classList.add('hidden');

    try {
      const res  = await fetch('/auth/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        })
      });
      const data = await res.json();

      if (data.success) {
        // Always save to localStorage (session persists until logout or manual clear)
        localStorage.setItem('us_token', data.access_token);
        localStorage.setItem('us_user',  JSON.stringify(data.user));

        // If "remember me" is checked, also mark persistent flag
        if (remember) {
          localStorage.setItem('us_persist', '1');
        } else {
          // Still save session but mark as non-persistent
          // (we still use localStorage so it survives page refresh,
          //  but logout() will clear it just the same)
          localStorage.removeItem('us_persist');
        }

        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="17" height="17"><polyline points="20 6 9 17 4 12"/></svg><span>Signed in!</span>`;
        btn.style.background = 'linear-gradient(135deg,#4A8C4A,#6AB86A)';
        setTimeout(() => { window.location.href = '/dashboard'; }, 500);
      } else {
        errDiv.textContent = data.error || 'Login failed. Check your credentials.';
        errDiv.classList.remove('hidden');
        resetBtn();
      }
    } catch {
      errDiv.textContent = 'Connection error. Is the server running?';
      errDiv.classList.remove('hidden');
      resetBtn();
    }
  }

  function resetBtn() {
    const btn = document.getElementById('loginBtn');
    btn.disabled = false;
    btn.style.background = '';
    btn.innerHTML = `<span id="loginBtnText">Sign In</span>
      <svg class="login-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </svg>`;
  }

  function togglePass(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }

  // Enter key on email → focus password
  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('password').focus(); }
  });
  </script>

  <style>
  @keyframes spin { to { transform: rotate(360deg); } }
  #loginBtn { transition: background 0.3s, transform 0.2s, box-shadow 0.3s; }
  #loginBtn .login-icon { transition: transform 0.3s ease; }
  #loginBtn:hover:not(:disabled) .login-icon { transform: translateX(4px); }
  </style>
</body>
</html>
