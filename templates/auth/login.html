<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — UniSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/modules/auth.css">
</head>
<body class="auth-body">

  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
    <div class="auth-orb orb-3"></div>
    <div class="auth-grid"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-logo">
        <svg width="44" height="44" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="17" stroke="url(#lg1)" stroke-width="2"/>
          <path d="M10 24 L18 12 L26 24" stroke="url(#lg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="18" cy="22" r="2.5" fill="url(#lg2)"/>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7C6FFF"/><stop offset="1" stop-color="#C084FC"/>
            </linearGradient>
            <linearGradient id="lg2" x1="10" y1="12" x2="26" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#A78BFA"/><stop offset="1" stop-color="#EC4899"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <h1>UniSync</h1>
          <p>Rabindra University, Bangladesh</p>
        </div>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Sign in to your academic portal</p>

      <div id="authError" class="auth-error hidden"></div>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-pass" onclick="togglePass('password')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-full" id="loginBtn">
          <span>Sign In</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        </button>
      </form>

      <!-- Guest Mode -->
      <div class="guest-divider"><span>or</span></div>
      <a href="/guest/" class="btn-guest">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="17" height="17">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Continue as Guest — No login needed
      </a>

      <p class="auth-switch">No account? <a href="/auth/register">Create one free</a></p>
    </div>
  </div>

  <script>
  async function handleLogin(e) {
    e.preventDefault();
    const btn    = document.getElementById('loginBtn');
    const errDiv = document.getElementById('authError');
    btn.disabled = true;
    btn.innerHTML = '<span>Signing in…</span>';
    errDiv.classList.add('hidden');

    try {
      const res  = await fetch('/auth/api/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          email:    document.getElementById('email').value,
          password: document.getElementById('password').value,
        })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('us_token', data.access_token);
        localStorage.setItem('us_user',  JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } else {
        errDiv.textContent = data.error || 'Login failed. Check your credentials.';
        errDiv.classList.remove('hidden');
        resetBtn();
      }
    } catch {
      errDiv.textContent = 'Connection error. Is the server running?';
      errDiv.classList.remove('hidden');
      resetBtn();
    }
  }

  function resetBtn() {
    const btn = document.getElementById('loginBtn');
    btn.disabled = false;
    btn.innerHTML = '<span>Sign In</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
  }

  function togglePass(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
  </script>
</body>
</html>
