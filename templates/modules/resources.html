{% extends "base.html" %}
{% block title %}Resources{% endblock %}
{% block nav_resources %}active{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="page-header scroll-reveal">
        <div>
            <h1 class="page-title">Study Resources</h1>
            <p class="page-sub">Notes, files and study materials</p>
        </div>
        <button class="btn-primary" onclick="openAddResource()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Upload
        </button>
    </div>

    <div class="filter-bar">
        <input type="text" id="resourceSearch" placeholder="Search by subject..." class="filter-search" oninput="loadResources()">
    </div>

    <div class="resources-grid scroll-stagger" id="resourcesGrid">
        <div class="resource-skeleton"></div>
        <div class="resource-skeleton"></div>
    </div>
</div>

<!-- Add Resource Modal -->
<div class="modal-overlay hidden" id="addResourceModal">
    <div class="modal-box">
        <button class="modal-close" onclick="document.getElementById('addResourceModal').classList.add('hidden')">✕</button>
        <h3>Share a Resource</h3>
        <form onsubmit="submitResource(event)" class="modal-form">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="r_title" placeholder="e.g., MGT-3103 Chapter 5 Notes" required>
            </div>
            <div class="form-group">
                <label>Subject / Course</label>
                <input type="text" id="r_subject" placeholder="e.g., Insurance and Risk Management">
            </div>
            <div class="form-group">
                <label>File URL (Google Drive, etc.)</label>
                <input type="url" id="r_url" placeholder="https://drive.google.com/...">
            </div>
            <button type="submit" class="btn-primary btn-full">Share Resource</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    UniSync.requireAuth();
    loadResources();
});

async function loadResources() {
    const search = document.getElementById('resourceSearch').value;
    const params = new URLSearchParams({dept:'Management'});
    if (search) params.append('subject', search);

    const grid = document.getElementById('resourcesGrid');
    grid.innerHTML = '<div class="resource-skeleton"></div><div class="resource-skeleton"></div>';

    try {
        const res = await fetch(`/campus/api/resources?${params}`);
        const data = await res.json();

        if (!data.success || !data.data.length) {
            grid.innerHTML = `<div class="empty-state-full">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="56" height="56">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <h3>No resources yet</h3>
                <p>Be the first to share study materials!</p>
            </div>`;
            return;
        }

        const currentUser = UniSync.getUser();
        const currentName = currentUser?.full_name || '';

        grid.innerHTML = data.data.map(r => {
            const isOwner = currentName && r.uploaded_by === currentName;
            return `
            <div class="resource-card" id="rc-${r.id}">
                <div class="resource-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="28" height="28">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
                    </svg>
                </div>
                <div class="resource-info">
                    <div class="resource-title">${r.title || 'Untitled'}</div>
                    <div class="resource-subject">${r.subject || r.dept}</div>
                    ${r.created_at ? `<div style="font-size:0.65rem;color:var(--text-muted);margin-top:2px;">${new Date(r.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>` : ''}
                    <div class="resource-uploader" style="display:flex;align-items:center;gap:5px;margin-top:4px;">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="11" height="11" style="color:var(--terra);flex-shrink:0;">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                      </svg>
                      <span style="font-size:0.70rem;color:var(--text-muted);">
                        ${r.uploaded_by && r.uploaded_by !== 'Anonymous'
                          ? `<strong style="color:var(--text-secondary);font-weight:600;">${r.uploaded_by}</strong>`
                          : 'Anonymous'}
                      </span>
                      ${isOwner ? '<span style="font-size:0.58rem;background:rgba(188,111,55,0.10);color:var(--terra);border:1px solid rgba(188,111,55,0.22);border-radius:10px;padding:1px 6px;font-weight:700;letter-spacing:0.05em;">You</span>' : ''}
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
                    ${r.file_url ? `<a href="${r.file_url}" target="_blank" class="btn-sm resource-download">Open →</a>` : ''}
                    ${isOwner ? `
                    <button class="btn-sm btn-danger" onclick="deleteResource('${r.id}')"
                        title="Delete this resource"
                        style="display:flex;align-items:center;gap:4px;">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                      </svg>
                      Delete
                    </button>` : ''}
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        console.error(e);
        grid.innerHTML = '<div class="empty-state"><p>Failed to load resources. Check connection.</p></div>';
    }
}

async function deleteResource(id) {
    if (!confirm('Delete this resource? This cannot be undone.')) return;

    const card = document.getElementById(`rc-${id}`);
    if (card) { card.style.opacity = '0.4'; card.style.pointerEvents = 'none'; }

    try {
        const res  = await fetch(`/campus/api/resources/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            UniSync.toast('Resource deleted.', 'success');
            if (card) card.remove();
        } else {
            UniSync.toast(data.error || 'Delete failed', 'error');
            if (card) { card.style.opacity = '1'; card.style.pointerEvents = ''; }
        }
    } catch(e) {
        UniSync.toast('Connection error', 'error');
        if (card) { card.style.opacity = '1'; card.style.pointerEvents = ''; }
    }
}

async function submitResource(e) {
    e.preventDefault();
    const user = UniSync.getUser();
    const payload = {
        title: document.getElementById('r_title').value,
        subject: document.getElementById('r_subject').value,
        file_url: document.getElementById('r_url').value,
        dept: 'Management',
        uploaded_by: user?.full_name || 'Anonymous',
    };
    try {
        const res = await fetch('/campus/api/resources', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
            UniSync.toast('Resource shared!', 'success');
            document.getElementById('addResourceModal').classList.add('hidden');
            e.target.reset();
            loadResources();
        }
    } catch(e) { UniSync.toast('Error', 'error'); }
}

function openAddResource() { document.getElementById('addResourceModal').classList.remove('hidden'); }
</script>
{% endblock %}
